{% extends "base.html" %}
{% set no_sidebar = true %}

{% block title %}Reset Password | CyberShield Smart RBAC{% endblock %}

{% block auth_content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fa-solid fa-key text-primary"></i>
            </div>
            <h3 class="fw-bold text-light mb-1">RESET PASSWORD</h3>
            <p class="text-secondary font-monospace" style="font-size: 0.85rem;">CHOOSE A NEW SECURE PASSWORD</p>
        </div>

        <form action="{{ url_for('auth.reset_password') }}" method="POST">
            <!-- Include token in request body to ensure validation on POST submission -->
            <input type="hidden" name="token" value="{{ token }}">
            
            <div class="mb-3">
                <label for="new_password" class="form-label">New Password</label>
                <div class="input-group">
                    <span class="input-group-text border-secondary bg-dark-subtle text-secondary"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="new_password" id="new_password" class="form-control cyber-input" placeholder="Enter new password" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <div class="input-group">
                    <span class="input-group-text border-secondary bg-dark-subtle text-secondary"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="confirm_password" id="confirm_password" class="form-control cyber-input" placeholder="Confirm new password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-cyber-primary w-100 font-monospace py-2">
                UPDATE PASSWORD <i class="fa-solid fa-shield ms-1"></i>
            </button>
        </form>

        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="text-secondary font-monospace" style="font-size: 0.8rem; text-decoration: none;">
                <i class="fa-solid fa-arrow-left me-1"></i> Back to login
            </a>
        </div>
    </div>
</div>
{% endblock %}
